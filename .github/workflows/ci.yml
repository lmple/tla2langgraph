name: CI

on:
  push:
    branches: [main, "001-*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/

      - name: Type check (mypy)
        run: mypy --strict src/

      - name: Run tests with coverage
        run: pytest --cov=tla2langgraph --cov-fail-under=90

      - name: Quickstart smoke test (constitution §V)
        run: |
          tla2langgraph --no-browser tests/fixtures/traffic_light.tla &
          SERVER_PID=$!
          sleep 3
          # Find the port from process output (server logs to stdout)
          # Simplified: try default range ports or use a fixed port
          tla2langgraph --port 18421 --no-browser tests/fixtures/traffic_light.tla &
          SERVER_PID2=$!
          sleep 2
          curl -sf http://127.0.0.1:18421/api/health
          kill $SERVER_PID $SERVER_PID2 2>/dev/null || true
